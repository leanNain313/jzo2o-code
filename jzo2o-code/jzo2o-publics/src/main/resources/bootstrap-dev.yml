spring:
  cloud:
    nacos:
      username: ${NACOS_USERNAME}
      password: ${NACOS_PASSWORD}
      server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      config:
        namespace: ${NACOS_NAMESPACE:your-nacos-namespace}
        file-extension: yaml
      discovery:
        namespace: ${NACOS_NAMESPACE:your-nacos-namespace}

#################     日志配置     #################
logging:
  level:
    com.jzo2o: debug